<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="amberD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd28a"/>
      <stop offset="1" stop-color="#e89a3a"/>
    </linearGradient>
    <linearGradient id="woodFront" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a67434"/>
      <stop offset="0.5" stop-color="#e0ad6e"/>
      <stop offset="1" stop-color="#8a5d28"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#000000"/>

  <!-- Clothesline — thicker, lighter so it pops -->
  <path d="M 0 96 Q 256 130 512 96" fill="none" stroke="#cfd6df" stroke-width="12" stroke-linecap="round"/>

  <!-- Robot body (420×340) -->
  <g transform="translate(256 322)">
    <rect x="-210" y="-170" width="420" height="340" rx="48" fill="url(#amberD)" stroke="#000000" stroke-width="4"/>
    <ellipse cx="-152" cy="-166" rx="26" ry="7" fill="#000000" opacity="0.35"/>
    <ellipse cx="152"  cy="-166" rx="26" ry="7" fill="#000000" opacity="0.35"/>
    <circle cx="-172" cy="-130" r="8" fill="#000000" opacity="0.35"/>
    <circle cx="172"  cy="-130" r="8" fill="#000000" opacity="0.35"/>
    <circle cx="-172" cy="130" r="8" fill="#000000" opacity="0.35"/>
    <circle cx="172"  cy="130" r="8" fill="#000000" opacity="0.35"/>
    <ellipse cx="-78" cy="-50" rx="50" ry="52" fill="#000000"/>
    <ellipse cx="78"  cy="-50" rx="50" ry="52" fill="#000000"/>
    <circle cx="-70" cy="-58" r="18" fill="#ffd28a"/>
    <circle cx="86"  cy="-58" r="18" fill="#ffd28a"/>
    <path d="M -62 64 Q 0 106 62 64" fill="none" stroke="#000000" stroke-width="15" stroke-linecap="round"/>
    <rect x="-80" y="170" width="32" height="22" rx="10" fill="#8b9aab" stroke="#000000" stroke-width="2.5"/>
    <rect x="48"  y="170" width="32" height="22" rx="10" fill="#8b9aab" stroke="#000000" stroke-width="2.5"/>
    <ellipse cx="-64" cy="184" rx="28" ry="6" fill="#5c6773" stroke="#000000" stroke-width="2.5"/>
    <ellipse cx="64"  cy="184" rx="28" ry="6" fill="#5c6773" stroke="#000000" stroke-width="2.5"/>
  </g>

  <!-- Antenna -->
  <line x1="256" y1="152" x2="256" y2="54" stroke="#cfd6df" stroke-width="11" stroke-linecap="round"/>
  <circle cx="256" cy="40" r="20" fill="#ffb454" stroke="#000000" stroke-width="3"/>

  <!-- LEFT clothespin — BIGGER -->
  <g>
    <path d="M 78 20 Q 78 8 90 8 L 124 8 Q 136 8 136 20 L 136 80 L 78 80 Z"
          fill="url(#woodFront)" stroke="#000000" stroke-width="3"/>
    <line x1="107" y1="8" x2="107" y2="80" stroke="#000000" stroke-width="1.5" opacity="0.55"/>
    <rect x="70" y="80" width="74" height="18" rx="5" fill="#cfd6df" stroke="#000000" stroke-width="2.5"/>
    <line x1="78" y1="89" x2="138" y2="89" stroke="#000000" stroke-width="1.1" opacity="0.5"/>
    <path d="M 80 100 L 136 100 L 130 224 L 90 224 Z" fill="url(#woodFront)" stroke="#000000" stroke-width="3"/>
    <line x1="108" y1="114" x2="108" y2="216" stroke="#5d3d18" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- RIGHT clothespin — BIGGER -->
  <g>
    <path d="M 376 20 Q 376 8 388 8 L 422 8 Q 434 8 434 20 L 434 80 L 376 80 Z"
          fill="url(#woodFront)" stroke="#000000" stroke-width="3"/>
    <line x1="405" y1="8" x2="405" y2="80" stroke="#000000" stroke-width="1.5" opacity="0.55"/>
    <rect x="368" y="80" width="74" height="18" rx="5" fill="#cfd6df" stroke="#000000" stroke-width="2.5"/>
    <line x1="376" y1="89" x2="436" y2="89" stroke="#000000" stroke-width="1.1" opacity="0.5"/>
    <path d="M 378 100 L 434 100 L 428 224 L 388 224 Z" fill="url(#woodFront)" stroke="#000000" stroke-width="3"/>
    <line x1="406" y1="114" x2="406" y2="216" stroke="#5d3d18" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
